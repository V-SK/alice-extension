name: Master
on:
  push:
    branches:
      - master

# Alice fork: upstream's `build:release` (polkadot-ci-ghact-build) publishes to the
# polkadot-js npm + GitHub releases and required a `GH_PAT_BOT` secret the fork does not
# have — its checkout failed with "Input required and not supplied: token" on every push.
# A fork only needs the built extension zips for store submission, so this just builds and
# uploads them as artifacts using the default GITHUB_TOKEN (no PAT, no publish).
jobs:
  build:
    if: "! startsWith(github.event.head_commit.message, '[CI Skip]')"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: build
      run: |
        corepack enable
        yarn install --immutable
        yarn build
    - name: upload extension builds
      uses: actions/upload-artifact@v4
      with:
        name: alice-extension-builds
        path: |
          master-chrome-build.zip
          master-ff-build.zip
        if-no-files-found: error
